[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
provenn_protocol = "Ayfm8HcwaMTXFVxc3zTvXBcLAu57tHc4gVKMgE1wSpr2"

[programs.devnet]
provenn_protocol = "Ayfm8HcwaMTXFVxc3zTvXBcLAu57tHc4gVKMgE1wSpr2"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
# In-process litesvm integration tests (no live validator). See tests/README-style
# header in tests/provenn.test.ts. Run: cd tests && npm install && npm test
test = "bash -c 'cd tests && npm install --no-audit --no-fund && npm test'"
