name: keepalive

# Render's free tier spins the service down after ~15 minutes of no traffic;
# a cold start takes ~1 min, which would look like an outage to judges.
# Ping a cheap endpoint every 10 minutes to keep it warm through Jul 29.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          curl -fsS --max-time 60 -o /dev/null -w "provenn api %{http_code} in %{time_total}s\n" \
            https://provenn.onrender.com/api/agent
