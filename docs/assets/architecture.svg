<svg width="680" height="452" viewBox="0 0 680 452" xmlns="http://www.w3.org/2000/svg">
<title>Provenn commit-reveal-settle flow</title>
<desc>Watch, commit, and reveal happen in sequence, then settlement branches into a preferred trustless proof path and an admin fallback, both converging on the on-chain Brier score.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<style>
  .box { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .boxTeal { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .boxAmber { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .boxPurple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .th { font: 500 14px sans-serif; fill: #042C53; }
  .ts { font: 400 12px sans-serif; fill: #185FA5; }
  .thTeal { font: 500 14px sans-serif; fill: #04342C; }
  .tsTeal { font: 400 12px sans-serif; fill: #0F6E56; }
  .thAmber { font: 500 14px sans-serif; fill: #412402; }
  .tsAmber { font: 400 12px sans-serif; fill: #854F0B; }
  .thPurple { font: 500 14px sans-serif; fill: #26215C; }
  .tsPurple { font: 400 12px sans-serif; fill: #534AB7; }
  .arr { stroke: #5f5e5a; stroke-width: 1.5; fill: none; }
</style>

<rect class="box" x="40" y="40" width="170" height="56" rx="8"/>
<text class="th" x="125" y="58" text-anchor="middle" dominant-baseline="central">Watch</text>
<text class="ts" x="125" y="76" text-anchor="middle" dominant-baseline="central">Gated live odds poll</text>

<rect class="box" x="230" y="40" width="170" height="56" rx="8"/>
<text class="th" x="315" y="58" text-anchor="middle" dominant-baseline="central">Commit</text>
<text class="ts" x="315" y="76" text-anchor="middle" dominant-baseline="central">sha256 hash on-chain</text>

<rect class="box" x="420" y="40" width="200" height="56" rx="8"/>
<text class="th" x="520" y="58" text-anchor="middle" dominant-baseline="central">Reveal</text>
<text class="ts" x="520" y="76" text-anchor="middle" dominant-baseline="central">Plaintext + nonce checked</text>

<line x1="210" y1="68" x2="230" y2="68" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="68" x2="420" y2="68" class="arr" marker-end="url(#arrow)"/>
<path d="M520 96 L520 150 L330 150 L330 170" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="260" y="170" width="140" height="44" rx="8"/>
<text class="th" x="330" y="192" text-anchor="middle" dominant-baseline="central">Settle</text>

<path d="M330 214 L330 240 L240 240 L240 270" class="arr" marker-end="url(#arrow)"/>
<path d="M330 214 L330 240 L460 240 L460 270" class="arr" marker-end="url(#arrow)"/>

<rect class="boxTeal" x="135" y="270" width="210" height="56" rx="8"/>
<text class="thTeal" x="240" y="288" text-anchor="middle" dominant-baseline="central">Proof settle</text>
<text class="tsTeal" x="240" y="306" text-anchor="middle" dominant-baseline="central">Trustless TxODDS proof</text>

<rect class="boxAmber" x="375" y="270" width="170" height="56" rx="8"/>
<text class="thAmber" x="460" y="288" text-anchor="middle" dominant-baseline="central">Admin settle</text>
<text class="tsAmber" x="460" y="306" text-anchor="middle" dominant-baseline="central">Admin fallback path</text>

<path d="M240 326 L240 345 L280 345 L280 356" class="arr" marker-end="url(#arrow)"/>
<path d="M460 326 L460 345 L380 345 L380 356" class="arr" marker-end="url(#arrow)"/>

<rect class="boxPurple" x="210" y="356" width="240" height="56" rx="8"/>
<text class="thPurple" x="330" y="374" text-anchor="middle" dominant-baseline="central">Brier score updates</text>
<text class="tsPurple" x="330" y="392" text-anchor="middle" dominant-baseline="central">Silence scores max loss</text>
</svg>
